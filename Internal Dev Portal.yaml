openapi: "3.0.0"
info:
  title: "Kong Konnect Internal APIs (Dev On-Prem)"
  version: "1.7.14"
  description: "Takaful internal services exposed through Kong Gateway. Call /api/token first to obtain an access token, then reuse Authorization: Bearer <access_token> for protected APIs. Service-specific headers such as apikey, X-Auth-Token, or X-API-KEY are required only for selected flows."
servers:
  - url: "https://kong-api-dev.takaful-malaysia.com.my:443"
    description: "Internal Takaful API Dev Server"
tags:
  - name: "AMLA"
    description: "AMLA APIs"
  - name: "Banca"
    description: "Banca APIs"
  - name: "ClaimHistory"
    description: "ClaimHistory APIs"
  - name: "Token"
    description: "Token APIs"
  - name: "KYC"
    description: "KYC APIs"
paths:
  "/aml/restsvc-ab/scan":
    post:
      tags:
        - "AMLA"
      summary: "Aml Restsvcab Scan"
      description: "Generated from Kong route aml-restsvcab-scan, service AML-Rest-Services."
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: "object"
            example: |
              {"Client_Name":"<client-name>","Client_DOB":"","Client_ID_Type":"NRIC","Client_ID_No":"<client-id-no>","Client_Gender":"","Client_Nationality":"","Source_System":"DTM","Transaction_Type":"NB","Department_Code":"FUCS","Transaction_Ref_No":"<transaction-ref-no>","Transaction_Ref_No_2":"","Transaction_Date":"YYYY-MM-DD","Name01":"","Name02":"","Name03":"","Name04":"","Name05":"","Name06":"","Name07":"","Name08":"","Name09":"","Name10":"","Name11":"","Name12":"","Name13":"","Name14":"","Name15":""}
      responses:
        "200":
          description: "Success"
  "/aml/restsvc/scan":
    post:
      tags:
        - "AMLA"
      summary: "Aml Restsvc Route"
      description: "Generated from Kong route aml-restsvc-route, service AML-Rest-Services."
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: "object"
            example: |
              {"Client_Name":"<client-name>","Client_DOB":"","Client_ID_Type":"NRIC","Client_ID_No":"<client-id-no>","Client_Gender":"","Client_Nationality":"","Source_System":"DTM","Transaction_Type":"NB","Department_Code":"FUCS","Transaction_Ref_No":"<transaction-ref-no>","Transaction_Ref_No_2":"","Transaction_Date":"YYYY-MM-DD","Name01":"","Name02":"","Name03":"","Name04":"","Name05":"","Name06":"","Name07":"","Name08":"","Name09":"","Name10":"","Name11":"","Name12":"","Name13":"","Name14":"","Name15":""}
      responses:
        "200":
          description: "Success"
  "/api/banca/calculate":
    post:
      tags:
        - "Banca"
      summary: "Banca Web Calculate Route"
      description: "Generated from Kong route banca-web-calculate-route, service BancaWeb-API."
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/X_Auth_TokenHeader"
      requestBody:
        required: true
        content:
          "application/xml":
            schema:
              type: "string"
            example: |
              <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
              <calculate>
                <body>
                  <nationality>Malaysian</nationality>
                  <dob>YYYYMMDD</dob>
                  <gender>Male</gender>
                  <paymentbasis>N</paymentbasis>
                  <plantype>BLTT</plantype>
                  <schemename>01</schemename>
                  <fr1>0.00</fr1>
                  <fr2>INCLUSIVE</fr2>
                  <fr3>1</fr3>
                  <amount>1500000</amount>
                  <interim>0</interim>
                </body>
              </calculate>
      responses:
        "200":
          description: "Success"
  "/api/banca/quotation":
    post:
      tags:
        - "Banca"
      summary: "Banca Web Quotation Route"
      description: "Generated from Kong route banca-web-quotation-route, service BancaWeb-API."
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/X_Auth_TokenHeader"
      requestBody:
        required: true
        content:
          "application/xml":
            schema:
              type: "string"
            example: |
              <?xml version="1.0" encoding="UTF-8"?>
              <equotation>
                <body>
                  <pfeid>&lt;pfeid&gt;</pfeid>
                  <name>&lt;name&gt;</name>
                  <nationality>Malaysian</nationality>
                  <mykad>&lt;masked-id&gt;</mykad>
                  <dob>YYYYMMDD</dob>
                  <gender>Female</gender>
                  <paymentbasis>G</paymentbasis>
                  <plantype>MLTT</plantype>
                  <schemename>01</schemename>
                  <amount>10000</amount>
                  <email>user@example.com</email>
                  <mobile>&lt;mobile&gt;</mobile>
                </body>
              </equotation>
      responses:
        "200":
          description: "Success"
  "/auth/banca/authenticate":
    post:
      tags:
        - "Banca"
      summary: "Banca Auth Authenticate Route"
      description: "Generated from Kong route banca-auth-authenticate-route, service BancaWeb-API."
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      requestBody:
        required: true
        content:
          "application/xml":
            schema:
              type: "string"
            example: |
              <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
              <authentication>
                <body>
                  <apiKey>&lt;banca-api-key&gt;</apiKey>
                  <apiSecret>&lt;banca-api-secret&gt;</apiSecret>
                </body>
              </authentication>
      responses:
        "200":
          description: "Success"
  "/auth/banca/login":
    post:
      tags:
        - "Banca"
      summary: "Banca Auth Login Route"
      description: "Generated from Kong route banca-auth-login-route, service BancaWeb-API."
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: "object"
            example: |
              {"UserName":"<username>","Password":"<password>"}
      responses:
        "200":
          description: "Success"
  "/auth/banca/logout":
    post:
      tags:
        - "Banca"
      summary: "Banca Auth Logout Route"
      description: "Generated from Kong route banca-auth-logout-route, service BancaWeb-API."
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: "object"
            example: |
              {"SessionID":"<session-id>"}
      responses:
        "200":
          description: "Success"
  "/api/storm/account":
    post:
      tags:
        - "ClaimHistory"
      summary: "Claimhistory Storm Account Route"
      description: "Generated from Kong route claimhistory-storm-account-route, service ClaimHistory-Storm-API."
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/X_API_KEYHeader"
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: "object"
            example: |
              {"userNric":"<nric>","userEmail":"user@example.com","userName":"<username>","userMobile":"<mobile>","userDob":"DD/MM/YYYY","userNricType":"NEW"}
      responses:
        "200":
          description: "Success"
  "/api/storm/velogica":
    post:
      tags:
        - "ClaimHistory"
      summary: "Claimhistory Storm Velogica Route"
      description: "Generated from Kong route claimhistory-storm-velogica-route, service ClaimHistory-Storm-API."
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/X_API_KEYHeader"
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: "object"
            example: |
              {"nric":"<nric>","productCode":"<product-code>"}
      responses:
        "200":
          description: "Success"
  "/api/wsmanager/kyc/riskscore/getLatest":
    get:
      tags:
        - "KYC"
      summary: "Kyc Wsmanager Kyc Risk Score Latest Route"
      description: "Generated from Kong route kyc-wsmanager-kyc-risk-score-latest-route, service KYC-WSManager-API."
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/apikeyHeader"
        - name: "clientKey"
          in: "query"
          required: true
          schema:
            type: "string"
        - name: "zoneId"
          in: "query"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "Success"
  "/api/wsmanager/kycTopic/get":
    get:
      tags:
        - "KYC"
      summary: "Kyc Wsmanager Kyc Topic Get Route"
      description: "Generated from Kong route kyc-wsmanager-kyc-topic-get-route, service KYC-WSManager-API."
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/apikeyHeader"
        - name: "topic"
          in: "query"
          required: true
          schema:
            type: "string"
        - name: "clientId"
          in: "query"
          required: true
          schema:
            type: "string"
        - name: "groupId"
          in: "query"
          required: true
          schema:
            type: "string"
        - name: "count"
          in: "query"
          required: false
          schema:
            type: "string"
      responses:
        "200":
          description: "Success"
  "/api/wsmanager/kycinput/add":
    post:
      tags:
        - "KYC"
      summary: "Kyc Wsmanager Input Add Route"
      description: "Generated from Kong route kyc-wsmanager-input-add-route, service KYC-WSManager-API."
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/apikeyHeader"
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: "object"
            example: |
              {"messageId":"<message-id>","partitionId":"0","message":"<xml-string-payload>"}
      responses:
        "200":
          description: "Success"
  "/api/token":
    post:
      tags:
        - "Token"
      summary: "OIDC Get Token"
      description: "Generated from Kong route OIDC-Get-Token, service __GET_TOKEN_SERVICE_NAME__."
      security: []
      requestBody:
        required: true
        content:
          "application/x-www-form-urlencoded":
            schema:
              type: "object"
            example: |
              {"grant_type":"client_credentials","client_id":"your-client-id","client_secret":"your-client-secret"}
      responses:
        "200":
          description: "Success"
components:
  parameters:
    AuthorizationHeader:
      name: "Authorization"
      in: "header"
      required: true
      description: "Bearer token required by the OIDC plugin on the owning service or route."
      schema:
        type: "string"
        example: "Bearer <access_token>"
    X_API_KEYHeader:
      name: "X-API-KEY"
      in: "header"
      required: true
      description: "Additional header configured from kong/env/user/devportal.env."
      schema:
        type: "string"
        example: "<X-API-KEY>"
    X_Auth_TokenHeader:
      name: "X-Auth-Token"
      in: "header"
      required: true
      description: "Additional header configured from kong/env/user/devportal.env."
      schema:
        type: "string"
        example: "<X-Auth-Token>"
    apikeyHeader:
      name: "apikey"
      in: "header"
      required: true
      description: "Additional header configured from kong/env/user/devportal.env."
      schema:
        type: "string"
        example: "<apikey>"
