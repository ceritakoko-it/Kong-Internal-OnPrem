_format_version: "3.0"
_konnect:
  control_plane_name: __CONTROL_PLANE_NAME__
services:
- connect_timeout: 60000
  enabled: true
  host: __AIR_FLIGHT_SERVICE_HOST__
  name: air-flight-service
  plugins:
  - config:
      custom_fields_by_lua: {}
      path: /usr/local/kong/logs/transaction.log
      reopen: false
    enabled: true
    name: file-log
    protocols:
    - grpc
    - grpcs
    - http
    - https
  port: 443
  protocol: https
  read_timeout: 60000
  retries: 5
  routes:
  - hosts:
    - __PUBLIC_HOST_PRIMARY_TLS__
    - __OPTIONAL_PUBLIC_HOST_SECONDARY_TLS__
    https_redirect_status_code: 426
    name: air-flight-search-route
    path_handling: v0
    paths:
    - /api/air-flight/search
    plugins:
    - config:
        add:
          body: []
          headers:
          - x-channel:web-portal
          querystring: []
        append:
          body: []
          headers: []
          querystring: []
        http_method: null
        remove:
          body: []
          headers: []
          querystring: []
        rename:
          body: []
          headers: []
          querystring: []
        replace:
          body: []
          headers: []
          querystring: []
          uri: /v1/flights/search
      enabled: true
      name: request-transformer
      protocols:
      - grpc
      - grpcs
      - http
      - https
    preserve_host: false
    protocols:
    - https
    regex_priority: 0
    request_buffering: true
    response_buffering: true
    strip_path: true
  write_timeout: 60000
