_format_version: "3.0"
_konnect:
  control_plane_name: __CONTROL_PLANE_NAME__
routes:
- hosts:
  - __PUBLIC_HOST_PRIMARY_TLS__
  - __OPTIONAL_PUBLIC_HOST_SECONDARY_TLS__
  https_redirect_status_code: 426
  name: air-flight-search-route
  path_handling: v0
  paths:
  - /api/air-flight/search
  plugins:
  - config:
      add:
        body: []
        headers:
        - x-channel:web-portal
        querystring: []
      append:
        body: []
        headers: []
        querystring: []
      http_method: null
      remove:
        body: []
        headers: []
        querystring: []
      rename:
        body: []
        headers: []
        querystring: []
      replace:
        body: []
        headers: []
        querystring: []
        uri: /v1/flights/search
    enabled: true
    name: request-transformer
    protocols:
    - grpc
    - grpcs
    - http
    - https
  preserve_host: false
  protocols:
  - https
  regex_priority: 0
  request_buffering: true
  response_buffering: true
  strip_path: true
  service:
    name: air-flight-service
