trigger: none
pr: none

parameters:
- name: mode
  displayName: Pipeline Mode
  type: string
  default: promotion
  values:
  - promotion
  - rollback
- name: environment
  displayName: Target Environment
  type: string
  default: Prod
  values:
  - Prod
- name: controlPlane
  displayName: Control Plane
  type: string
  default: OnPremise
  values:
  - OnPremise
- name: rollbackBuildId
  displayName: Rollback source Run/Build ID
  type: string
  default: 'not-required'
- name: rollbackBackupFile
  displayName: Rollback backup YAML filename
  type: string
  default: 'not-required'

stages:
- stage: Validate_Run_Rules
  displayName: Validate run rules
  jobs:
  - job: ValidateRules
    displayName: Check mode/environment/branch rules
    pool:
      name: cicd-agent
    steps:
    - bash: |
        set -euo pipefail

        MODE="${{ parameters.mode }}"
        ENVIRONMENT="${{ parameters.environment }}"
        BRANCH="$(Build.SourceBranch)"

        if [ "$ENVIRONMENT" = "Prod" ] && [ "$BRANCH" = "refs/heads/master" ]; then
          if [ "$MODE" = "promotion" ]; then
            echo "Valid run: promotion to Prod from master branch."
            exit 0
          fi
          if [ "$MODE" = "rollback" ]; then
            echo "Valid run: rollback on Prod from master branch."
            exit 0
          fi
        fi

        echo "Invalid run: prod pipeline supports only promotion or rollback on Prod from master branch."
        exit 1
      displayName: Enforce pipeline guardrails

- ${{ if eq(parameters.mode, 'promotion') }}:
  - template: pipelines/promotion.yml
    parameters:
      environment: ${{ parameters.environment }}
      controlPlane: ${{ parameters.controlPlane }}

- ${{ if eq(parameters.mode, 'rollback') }}:
  - template: pipelines/rollback.yml
    parameters:
      environment: ${{ parameters.environment }}
      controlPlane: ${{ parameters.controlPlane }}
      rollbackBuildId: ${{ parameters.rollbackBuildId }}
      rollbackBackupFile: ${{ parameters.rollbackBackupFile }}
