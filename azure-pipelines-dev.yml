trigger: none
pr: none

parameters:
- name: mode
  displayName: Pipeline Mode
  type: string
  default: deployment
  values:
  - deployment
- name: environment
  displayName: Target Environment
  type: string
  default: Dev
  values:
  - Dev
- name: controlPlane
  displayName: Control Plane
  type: string
  default: OnPremise
  values:
  - OnPremise

stages:
- stage: Validate_Run_Rules
  displayName: Validate run rules
  jobs:
  - job: ValidateRules
    displayName: Check mode/environment/branch rules
    pool:
      name: cicd-agent
    steps:
    - bash: |
        set -euo pipefail

        MODE="${{ parameters.mode }}"
        ENVIRONMENT="${{ parameters.environment }}"
        BRANCH="$(Build.SourceBranch)"

        if [ "$MODE" = "deployment" ] && [ "$ENVIRONMENT" = "Dev" ] && [ "$BRANCH" = "refs/heads/development" ]; then
          echo "Valid run: deployment on Dev from development branch."
          exit 0
        fi

        echo "Invalid run: dev pipeline supports only deployment on Dev from development branch."
        exit 1
      displayName: Enforce pipeline guardrails

- template: pipelines/deployment.yml
  parameters:
    environment: ${{ parameters.environment }}
    controlPlane: ${{ parameters.controlPlane }}
