"plugins":
  - "config":
      "allow_origin_absent": true
      "credentials": true
      "exposed_headers": null
      "headers": null
      "max_age": null
      "methods":
        - "GET"
        - "HEAD"
        - "PUT"
        - "PATCH"
        - "POST"
        - "DELETE"
        - "OPTIONS"
        - "TRACE"
        - "CONNECT"
      "origins":
        - "__CORS_ALLOWED_ORIGIN__"
      "preflight_continue": false
      "private_network": false
    "enabled": true
    "name": "cors"
    "protocols":
      - "grpc"
      - "grpcs"
      - "http"
      - "https"
