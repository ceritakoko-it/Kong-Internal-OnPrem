"consumers":
  - "custom_id": "__STANDARD_BANCA_PORTAL_USER_CUSTOM_ID__"
    "groups":
      - "name": "banca_portal_group"
    "plugins":
      - "config":
          "disable_penalty": false
          "error_code": 429
          "hide_client_headers": false
          "identifier": "consumer"
          "limit":
            - __STANDARD_BANCA_PORTAL_RATE_LIMIT_MINUTE__
            - __STANDARD_BANCA_PORTAL_RATE_LIMIT_HOUR__
          "namespace": "standard_banca_portal_user_rate_limit"
          "retry_after_jitter_max": 0
          "strategy": "redis"
          "sync_rate": -1
          "window_size":
            - 60
            - 3600
          "window_type": "fixed"
        "enabled": true
        "instance_name": "Standard-Banca-RateLimit-Advanced"
        "name": "rate-limiting-advanced"
        "partials":
          - "id": "__ACTIVE_REDIS_PARTIAL_ID__"
            "name": "__ACTIVE_REDIS_PARTIAL_NAME__"
            "path": "config.redis"
        "protocols":
          - "grpc"
          - "grpcs"
          - "http"
          - "https"
    "username": "standard_banca_portal_user"
