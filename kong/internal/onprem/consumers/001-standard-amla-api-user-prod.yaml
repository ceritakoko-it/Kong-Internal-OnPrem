"consumers":
  - "custom_id": "__STANDARD_AMLA_API_USER_CUSTOM_ID__"
    "groups":
      - "name": "amla_api_group"
    "keyauth_credentials":
      - "key": "902f11df-7a11-4f1a-bef1-03326df0c260"
    "plugins":
      - "config":
          "disable_penalty": false
          "error_code": 429
          "hide_client_headers": false
          "identifier": "consumer"
          "limit":
            - 1000
            - 1000
          "namespace": "standard_amla_api_user_rate_limit"
          "retry_after_jitter_max": 0
          "strategy": "redis"
          "sync_rate": -1
          "window_size":
            - 60
            - 3600
          "window_type": "fixed"
        "enabled": true
        "name": "rate-limiting-advanced"
        "partials":
          - "id": "498c2db2-f243-4fab-9743-7ef0bfb82512"
            "name": "__REDIS_PARTIAL_NAME__"
            "path": "config.redis"
        "protocols":
          - "grpc"
          - "grpcs"
          - "http"
          - "https"
    "username": "standard_amla_api_user"
