"services":
  - "connect_timeout": 60000
    "enabled": true
    "host": "__BANCAWEB_SERVICE_HOST__"
    "name": "BancaWeb-API"
    "tags":
      - "Banca"
      - "service:bancaweb-api"
    "plugins":
      - "config":
          "custom_fields_by_lua": {}
          "path": "/usr/local/kong/logs/transaction.log"
          "reopen": false
        "enabled": true
        "name": "file-log"
        "protocols":
          - "grpc"
          - "grpcs"
          - "http"
          - "https"
    "port": __BANCAWEB_SERVICE_PORT__
    "protocol": "http"
    "read_timeout": 60000
    "retries": 5
    "write_timeout": 60000
