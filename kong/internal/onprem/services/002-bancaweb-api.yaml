"services":
  - "connect_timeout": 60000
    "enabled": true
    "host": "__BANCAWEB_SERVICE_HOST__"
    "name": "BancaWeb-API"
    "tags":
      - "Banca"
      - "service:bancaweb-api"
    "plugins":
      - "config":
          "custom_fields_by_lua": {}
          "path": "/usr/local/kong/logs/transaction.log"
          "reopen": false
        "enabled": true
        "name": "file-log"
        "protocols":
          - "grpc"
          - "grpcs"
          - "http"
          - "https"
      - "config":
          "access":
            - "kong.service.request.enable_buffering()\n\nlocal b = kong.request.get_raw_body()\nif b then\n  kong.ctx.shared.req_body = b\nend\n"
          "body_filter":
            - "local chunk = ngx.arg[1]\nlocal eof   = ngx.arg[2]\n\nkong.ctx.shared.res_chunks = kong.ctx.shared.res_chunks or {}\n\nif chunk and #chunk > 0 then\n  table.insert(kong.ctx.shared.res_chunks, chunk)\nend\n\nif eof then\n  kong.ctx.shared.res_body = table.concat(kong.ctx.shared.res_chunks)\n  kong.ctx.shared.res_chunks = nil\nend\n"
          "certificate": []
          "functions": []
          "header_filter": []
          "log":
            - "local function full_redact(_)\n  return \"*REDACTED*\"\nend\n\nlocal function partial_mask(value)\n  if type(value) ~= \"string\" then\n    return value\n  end\n\n  local len = #value\n  if len == 0 then\n    return value\n  end\n  if len == 1 then\n    return \"*\"\n  end\n  if len == 2 then\n    return value:sub(1, 1) .. \"*\"\n  end\n\n  return value:sub(1, 1) .. string.rep(\"*\", len - 2) .. value:sub(len, len)\nend\n\nlocal function partial_mask_email(value)\n  if type(value) ~= \"string\" then\n    return value\n  end\n\n  local local_part, domain = value:match(\"^([^@]+)@(.+)$\")\n  if not local_part or not domain then\n    return partial_mask(value)\n  end\n\n  return partial_mask(local_part) .. \"@\" .. domain\nend\n\nlocal partial_redact_json_keys = {\n  nric = true, userNric = true, nric_no = true, identificationNumber = true,\n  fullName = true, full_name = true, userName = true, email = true,\n  userEmail = true, phone = true, userMobile = true, mobileNumber = true,\n  address = true, postcode = true, eCertNo = true, e_cover_note = true,\n  e_covernote = true, QuotationNo = true, policy_no = true,\n  reference_no = true, vehRegNo = true, vehicle_no = true\n}\n\nlocal email_like_json_keys = {\n  email = true, userEmail = true\n}\n\nlocal function mask_value_by_key(key, value)\n  if email_like_json_keys[key] then\n    return partial_mask_email(value)\n  end\n\n  if partial_redact_json_keys[key] then\n    return partial_mask(value)\n  end\n\n  return full_redact(value)\nend\n\nlocal function replace_json_key(s, key)\n  s = s:gsub('(\"' .. key .. '\"%s*:%s*\")([^\"]*)(\")', function(prefix, value, suffix)\n    return prefix .. mask_value_by_key(key, value) .. suffix\n  end)\n  return s\nend\n\nlocal function replace_xml_tag(s, tag, masker)\n  s = s:gsub(\"(<\" .. tag .. \">)(.-)(</\" .. tag .. \">)\", function(prefix, value, suffix)\n    return prefix .. masker(value) .. suffix\n  end)\n  return s\nend\n\nlocal function replace_xml_attr(s, attr, masker)\n  s = s:gsub(\"(\" .. attr .. '=\")([^\"]*)(\")', function(prefix, value, suffix)\n    return prefix .. masker(value) .. suffix\n  end)\n  return s\nend\n\nlocal function looks_like_pdf(s)\n  return type(s) == \"string\" and s:find(\"^%%PDF%-\")\nend\n\nlocal function looks_like_html(s)\n  if type(s) ~= \"string\" then\n    return false\n  end\n  local lower = s:lower()\n  return lower:find(\"<!doctype html\", 1, true)\n      or lower:find(\"<html\", 1, true)\n      or lower:find(\"<body\", 1, true)\nend\n\nlocal function redact_text(s)\n  if type(s) ~= \"string\" then\n    return s\n  end\n\n  local json_keys = {\n    \"token\", \"apiToken\", \"access_token\", \"refresh_token\", \"accessToken\", \"refreshToken\",\n    \"password\", \"passwd\", \"secret\", \"apiKey\", \"sessionId\",\n    \"nric\", \"userNric\", \"nric_no\", \"identificationNumber\",\n    \"fullName\", \"full_name\", \"userName\",\n    \"email\", \"userEmail\",\n    \"phone\", \"userMobile\", \"mobileNumber\",\n    \"address\", \"postcode\",\n    \"eCertNo\", \"e_cover_note\", \"e_covernote\",\n    \"QuotationNo\", \"policy_no\", \"reference_no\",\n    \"vehRegNo\", \"vehicle_no\",\n    \"rawDecryptedValue\",\n    \"clientKey\", \"client_key\", \"tempKey\", \"temp_key\",\n    \"renewalUrl\"\n  }\n\n  for _, key in ipairs(json_keys) do\n    s = replace_json_key(s, key)\n  end\n\n  local xml_full_redact_tags = {\n    \"apiToken\", \"clientKey\", \"tempKey\"\n  }\n\n  for _, tag in ipairs(xml_full_redact_tags) do\n    s = replace_xml_tag(s, tag, full_redact)\n  end\n\n  local xml_partial_redact_tags = {\n    \"nric\", \"userNric\", \"fullName\", \"email\", \"mobileNumber\", \"QuotationNo\"\n  }\n\n  for _, tag in ipairs(xml_partial_redact_tags) do\n    if tag == \"email\" then\n      s = replace_xml_tag(s, tag, partial_mask_email)\n    else\n      s = replace_xml_tag(s, tag, partial_mask)\n    end\n  end\n\n  local xml_full_redact_attrs = {\n    \"client_key\", \"temp_key\", \"tempKey\"\n  }\n\n  for _, attr in ipairs(xml_full_redact_attrs) do\n    s = replace_xml_attr(s, attr, full_redact)\n  end\n\n  s = s:gsub(\"[A-Za-z0-9-_]+%.[A-Za-z0-9-_]+%.[A-Za-z0-9-_]+\", \"*REDACTED*\")\n  s = s:gsub(\"%x%x%x%x%x%x%x%x%-%x%x%x%x%-%x%x%x%x%-%x%x%x%x%-%x%x%x%x%x%x%x%x%x%x%x%x\", \"*REDACTED*\")\n  s = s:gsub(\"[a-zA-Z0-9%.%%%+%-]+@[a-zA-Z0-9%.%-]+%.[a-zA-Z][a-zA-Z]+\", partial_mask_email)\n  s = s:gsub(\"%f[%d]%d%d%d%d%d%d%d%d%d%d%d%f[%D]\", partial_mask)\n  s = s:gsub(\"%f[%d]%d%d%d%d%d%d%-%d%d%-%d%d%d%d%f[%D]\", partial_mask)\n  s = s:gsub(\"%f[%d]0%d%d%d%d%d%d%d%d%d?%f[%D]\", partial_mask)\n  s = s:gsub(\"%f[%d]6%d%d%d%d%d%d%d%d%d?%f[%D]\", partial_mask)\n\n  return s\nend\n\nlocal function process_body(raw)\n  if not raw or raw == \"\" then\n    return nil\n  end\n\n  if looks_like_pdf(raw) then\n    return \"*REDACTED_BINARY_PDF*\"\n  end\n\n  if looks_like_html(raw) then\n    return \"*REDACTED_HTML_BODY*\"\n  end\n\n  return redact_text(raw)\nend\n\nlocal function sanitize_urlish(value)\n  if type(value) ~= \"string\" then\n    return value\n  end\n\n  value = value:gsub(\"([?&]e_certificate_no=)([^&]+)\", function(prefix, raw) return prefix .. partial_mask(raw) end)\n  value = value:gsub(\"([?&]nric=)([^&]+)\", function(prefix, raw) return prefix .. partial_mask(raw) end)\n  value = value:gsub(\"([?&]userNric=)([^&]+)\", function(prefix, raw) return prefix .. partial_mask(raw) end)\n  value = value:gsub(\"([?&]identificationNumber=)([^&]+)\", function(prefix, raw) return prefix .. partial_mask(raw) end)\n  value = value:gsub(\"([?&]vehRegNo=)([^&]+)\", function(prefix, raw) return prefix .. partial_mask(raw) end)\n  value = value:gsub(\"([?&]vehicle_no=)([^&]+)\", function(prefix, raw) return prefix .. partial_mask(raw) end)\n  value = value:gsub(\"([?&]policy_no=)([^&]+)\", function(prefix, raw) return prefix .. partial_mask(raw) end)\n  value = value:gsub(\"([?&]reference_no=)([^&]+)\", function(prefix, raw) return prefix .. partial_mask(raw) end)\n  return value\nend\n\nlocal req = process_body(kong.ctx.shared.req_body)\nif req then\n  kong.log.set_serialize_value(\"request.body\", req)\nend\n\nlocal res = process_body(kong.ctx.shared.res_body)\nif res then\n  kong.log.set_serialize_value(\"response.body\", res)\nend\n\nkong.log.set_serialize_value(\"request.headers.authorization\", \"*REDACTED*\")\nkong.log.set_serialize_value(\"request.headers.cookie\", \"*REDACTED*\")\nkong.log.set_serialize_value(\"response.headers.set-cookie\", \"*REDACTED*\")\n\nlocal request_uri = kong.request.get_path_with_query()\nif request_uri then\n  kong.log.set_serialize_value(\"request.uri\", sanitize_urlish(request_uri))\nend\n\nlocal scheme = kong.request.get_scheme()\nlocal host = kong.request.get_host()\nif scheme and host and request_uri then\n  kong.log.set_serialize_value(\"request.url\", sanitize_urlish(scheme .. \"://\" .. host .. request_uri))\nend\n\nlocal raw_query = kong.request.get_query()\nif type(raw_query) == \"table\" then\n  local query_keys = {\n    \"e_certificate_no\", \"nric\", \"userNric\", \"identificationNumber\",\n    \"vehRegNo\", \"vehicle_no\", \"policy_no\", \"reference_no\"\n  }\n\n  for _, key in ipairs(query_keys) do\n    if raw_query[key] ~= nil then\n      local value = raw_query[key]\n      if type(value) == \"table\" then\n        value = value[1]\n      end\n      kong.log.set_serialize_value(\"request.querystring.\" .. key, partial_mask(tostring(value)))\n    end\n  end\nend\n\nlocal upstream_uri = kong.ctx and kong.ctx.core and kong.ctx.core.upstream_uri\nif type(upstream_uri) == \"string\" then\n  kong.log.set_serialize_value(\"upstream_uri\", sanitize_urlish(upstream_uri))\nend"
          "rewrite": []
          "ws_client_frame": []
          "ws_close": []
          "ws_handshake": []
          "ws_upstream_frame": []
        "enabled": true
        "instance_name": "BancaWeb-API-PII-Redaction-Logger"
        "name": "pre-function"
        "protocols":
          - "grpc"
          - "grpcs"
          - "http"
          - "https"
    "port": __BANCAWEB_SERVICE_PORT__
    "protocol": "__BANCAWEB_SERVICE_PROTOCOL__"
    "read_timeout": 60000
    "retries": 5
    "write_timeout": 60000
