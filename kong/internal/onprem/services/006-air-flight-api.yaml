"services":
  - "connect_timeout": 60000
    "enabled": true
    "host": "__AIR_FLIGHT_SERVICE_HOST__"
    "name": "air-flight-service"
    "tags":
      - "AirFlight"
      - "service:air-flight-service"
    "plugins":
      - "config":
          "custom_fields_by_lua": {}
          "path": "/usr/local/kong/logs/transaction.log"
          "reopen": false
        "enabled": true
        "name": "file-log"
        "protocols":
          - "grpc"
          - "grpcs"
          - "http"
          - "https"
    "port": __AIR_FLIGHT_SERVICE_PORT__
    "protocol": "__AIR_FLIGHT_SERVICE_PROTOCOL__"
    "read_timeout": 60000
    "retries": 5
    "write_timeout": 60000
