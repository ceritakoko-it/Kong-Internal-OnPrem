jobs:
- job: Validate
  displayName: Validate Kong Configuration
  pool:
    name: cicd-agent
  steps:
  - checkout: self
    clean: true
    fetchDepth: 0
    displayName: Checkout self

  - bash: |
      set -euo pipefail
      if command -v deck >/dev/null 2>&1; then
        echo "Using preinstalled decK: $(command -v deck)"
        deck version
        exit 0
      fi

      DECK_VERSION="1.52.0"
      curl -sL "https://github.com/Kong/deck/releases/download/v${DECK_VERSION}/deck_${DECK_VERSION}_linux_amd64.tar.gz" -o deck.tar.gz
      tar -xzf deck.tar.gz
      sudo mv deck /usr/local/bin/deck
      rm -f deck.tar.gz
      deck version
    displayName: Ensure decK is available

  - bash: |
      set -euo pipefail
      found_any=false

      if [ -d "kong/internal/onprem" ]; then
        shopt -s nullglob
        for env_file in kong/env/user/*-onprem.env; do
          render_dir="$(mktemp -d)"
          echo "Rendering kong/internal/onprem with $env_file"
          bash scripts/render-kong-state.sh "kong/internal/onprem" "$env_file" "$render_dir"
          echo "Validating rendered output $render_dir"
          deck file validate "$render_dir"
          rm -rf "$render_dir"
          found_any=true
        done
      fi

      shopt -s nullglob
      for d in kong/*/*; do
        if [ -d "$d" ] && [[ "$d" != "kong/internal/"* ]] && [[ "$d" != "kong/external/"* ]] && [[ "$d" != "kong/env/"* ]]; then
          echo "Validating legacy modular state $d"
          deck file validate "$d"
          found_any=true
        fi
      done

      if [ "$found_any" != "true" ]; then
        echo "No renderable or modular Kong state found."
        exit 1
      fi
    displayName: Validate rendered and modular decK files
