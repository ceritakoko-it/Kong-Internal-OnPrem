parameters:
- name: devportalEnvFile
  type: string
  default: kong/env/user/devportal.env
- name: outputSpec
  type: string
  default: Internal Dev Portal.yaml
- name: includeProdRoutes
  type: boolean
  default: false

stages:
- stage: Generate_Dev_Portal_OpenAPI
  displayName: Generate Developer Portal OpenAPI
  condition: "and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/development'))"
  jobs:
  - job: GenerateOpenApi
    displayName: Generate OpenAPI from Kong Gateway routes
    pool:
      name: cicd-agent
    steps:
    - checkout: self
      clean: true
      fetchDepth: 0
      persistCredentials: true
      displayName: Checkout self

    - bash: |
        set -euo pipefail
        git checkout --force "$(Build.SourceVersion)"
        ACTUAL_COMMIT="$(git rev-parse HEAD)"
        echo "Branch: $(Build.SourceBranch)"
        echo "Requested commit: $(Build.SourceVersion)"
        echo "Checked out commit: ${ACTUAL_COMMIT}"
        test "$ACTUAL_COMMIT" = "$(Build.SourceVersion)"
      displayName: Pin checkout to selected commit

    - bash: |
        set -euo pipefail
        ENV_FILE="${{ parameters.devportalEnvFile }}"
        case "$ENV_FILE" in
          */devportal.env|devportal.env) ;;
          *)
            echo "Dev Portal generation can only read devportal.env. Received: $ENV_FILE"
            exit 1
            ;;
        esac
        test -f "$ENV_FILE" || { echo "Dev Portal env file not found: $ENV_FILE"; exit 1; }
      displayName: Validate Dev Portal env scope

    - bash: |
        set -euo pipefail

        if [ -z "${KONNECT_API_ID:-}" ]; then
          echo "KONNECT_API_ID is not set. Falling back to local spec version increment."
          echo "##vso[task.setvariable variable=RESOLVED_OPENAPI_VERSION]"
          exit 0
        fi

        test -n "${KONNECT_TOKEN:-}" || { echo "KONNECT_TOKEN is empty or not set"; exit 1; }
        test -n "${KONG_ADDR:-}" || { echo "KONG_ADDR is empty or not set"; exit 1; }

        KONNECT_API_BASE="${KONG_ADDR%/}"
        case "${AGENT_OS:-}" in
          Windows_NT)
            CURL_BIN="curl.exe"
            ;;
          *)
            CURL_BIN="curl"
            ;;
        esac

        if ! command -v "$CURL_BIN" >/dev/null 2>&1; then
          echo "$CURL_BIN was not found on this agent."
          exit 1
        fi

        VERSIONS_URL="${KONNECT_API_BASE}/v3/apis/${KONNECT_API_ID}/versions"
        echo "Fetching latest Dev Portal API spec version from: ${VERSIONS_URL}"

        RESPONSE_FILE="$(mktemp)"
        HTTP_CODE="$("$CURL_BIN" -sS -L \
          -o "$RESPONSE_FILE" \
          -w "%{http_code}" \
          -H "Authorization: Bearer ${KONNECT_TOKEN}" \
          -H "Accept: application/json" \
          "$VERSIONS_URL")"

        if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -gt 299 ]; then
          echo "Konnect API version lookup failed with HTTP ${HTTP_CODE}"
          cat "$RESPONSE_FILE"
          exit 1
        fi

        LATEST_VERSION="$(perl -0777 -ne '
          while (/"version"\s*:\s*"([0-9]+(?:\.[0-9]+){0,2})"/g) {
            push @versions, $1;
          }
          @versions = sort {
            my @a = split /\./, $a;
            my @b = split /\./, $b;
            push @a, 0 while @a < 3;
            push @b, 0 while @b < 3;
            ($a[0] <=> $b[0]) || ($a[1] <=> $b[1]) || ($a[2] <=> $b[2])
          } @versions;
          print $versions[-1] // "";
        ' "$RESPONSE_FILE")"

        if [ -z "$LATEST_VERSION" ]; then
          echo "No existing semantic OpenAPI version found in Konnect response. Starting at 1.0.0."
          NEXT_VERSION="1.0.0"
        else
          NEXT_VERSION="$(perl -e '
            my @p = split /\./, $ARGV[0];
            push @p, 0 while @p < 3;
            $p[2]++;
            print join ".", @p[0..2];
          ' "$LATEST_VERSION")"
        fi

        echo "Latest Konnect OpenAPI version: ${LATEST_VERSION:-none}"
        echo "Next OpenAPI version: ${NEXT_VERSION}"
        echo "##vso[task.setvariable variable=RESOLVED_OPENAPI_VERSION]${NEXT_VERSION}"
      displayName: Resolve OpenAPI version from Konnect
      env:
        KONNECT_TOKEN: $(KONNECT_TOKEN)
        KONG_ADDR: $(KONG_ADDR)
        KONNECT_API_ID: $(KONNECT_API_ID)

    - bash: |
        set -euo pipefail
        INCLUDE_PROD=""
        if [ "${{ parameters.includeProdRoutes }}" = "True" ] || [ "${{ parameters.includeProdRoutes }}" = "true" ]; then
          INCLUDE_PROD="--include-prod-routes"
        fi

        bash scripts/generate-devportal-openapi.sh \
          --env-file "${{ parameters.devportalEnvFile }}" \
          --output "${{ parameters.outputSpec }}" \
          --report "devportal-openapi-report.md" \
          ${RESOLVED_OPENAPI_VERSION:+--version "$RESOLVED_OPENAPI_VERSION"} \
          $INCLUDE_PROD
      displayName: Generate OpenAPI spec
      env:
        RESOLVED_OPENAPI_VERSION: $(RESOLVED_OPENAPI_VERSION)

    - bash: |
        set -euo pipefail
        test -s "${{ parameters.outputSpec }}" || { echo "Generated OpenAPI spec is empty"; exit 1; }
        test -s "devportal-openapi-report.md" || { echo "Generated Dev Portal report is empty"; exit 1; }
        grep -q '^openapi:' "${{ parameters.outputSpec }}" || { echo "Generated OpenAPI spec missing openapi field"; exit 1; }
        grep -q '^paths:' "${{ parameters.outputSpec }}" || { echo "Generated OpenAPI spec missing paths field"; exit 1; }
        echo "Generated OpenAPI spec:"
        grep -E '^(openapi:|  version:|  title:)' "${{ parameters.outputSpec }}" || true
      displayName: Validate generated spec surface

    - task: PublishBuildArtifacts@1
      displayName: Publish generated OpenAPI artifact
      inputs:
        PathtoPublish: ${{ parameters.outputSpec }}
        ArtifactName: devportal-openapi
        publishLocation: Container

    - task: PublishBuildArtifacts@1
      displayName: Publish generated OpenAPI report
      inputs:
        PathtoPublish: devportal-openapi-report.md
        ArtifactName: devportal-openapi-report
        publishLocation: Container
